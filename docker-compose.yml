version: '3.8'

services:
  crown-blogs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crown-blogs
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/crown-blogs.db
      - NEXT_PUBLIC_APP_NAME=Crown Blogs
    volumes:
      - crown-blogs-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  crown-blogs-data:
    driver: local
